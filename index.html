<!DOCTYPE html>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --creme:#F2EDE0; --tinta:#0F1010; --tijolo:#C8251C;
  --dourado:#C9A96E; --marinho:#1C2B4A; --verde:#3D6E4F; --azul:#7BA3B8;
}
body { background:#0A0B0B; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; user-select:none; }
#wrap { position:relative; width:min(900px,100vw); }
#ui-bar { background:var(--tinta); display:flex; align-items:center; justify-content:space-between; padding:5px 14px; border:2.5px solid var(--tinta); border-bottom:none; }
.titulo { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.06em; color:var(--dourado); }
.mundo  { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:0.18em; color:var(--azul); }
.ctrl   { font-family:'Courier Prime',monospace; font-size:10px; color:rgba(242,237,224,0.4); letter-spacing:0.1em; text-transform:uppercase; }
#gc { display:block; width:100%; height:auto; border:2.5px solid var(--tinta); image-rendering:crisp-edges; }

/* TEXT OVERLAY */
#text-overlay { position:absolute; inset:0; background:rgba(10,11,11,0.82); display:none; align-items:center; justify-content:center; z-index:10; }
#text-box { background:var(--creme); border:2.5px solid var(--tinta); max-width:500px; width:calc(100% - 60px); padding:30px 36px 22px; position:relative; font-family:'Courier Prime',monospace; font-size:15px; line-height:1.85; color:var(--tinta); }
#text-box.good { background:#F6F0DF; border-color:var(--verde); }
#text-box .lbl { position:absolute; top:-12px; left:18px; background:var(--creme); padding:0 8px; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--marinho); font-family:'Courier Prime',monospace; font-weight:700; }
#text-box.good .lbl { background:#F6F0DF; color:var(--verde); }
#tcontent { white-space:pre-line; display:block; }
#thint { display:block; margin-top:20px; font-size:10px; color:var(--marinho); letter-spacing:0.13em; opacity:0.5; text-transform:uppercase; }

/* DILEMA */
#dil-overlay { position:absolute; inset:0; background:rgba(28,43,74,0.96); display:none; align-items:center; justify-content:center; z-index:20; }
#dil-box { max-width:520px; width:calc(100% - 60px); padding:38px 48px; border:2px solid var(--dourado); font-family:'Courier Prime',monospace; font-size:15px; line-height:2.1; color:var(--dourado); text-align:center; }
#dcontent { white-space:pre-line; display:block; }
#dhint { display:block; margin-top:26px; font-size:10px; color:var(--dourado); opacity:0.4; letter-spacing:0.18em; text-transform:uppercase; }

/* TRANSITION */
#tr-overlay { position:absolute; inset:0; background:#0A0B0B; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:30; }
#tr-year  { font-family:'Bebas Neue',sans-serif; font-size:90px; color:var(--dourado); letter-spacing:0.08em; line-height:1; }
#tr-label { font-family:'Bebas Neue',sans-serif; font-size:30px; color:var(--dourado); letter-spacing:0.12em; margin-bottom:4px; }
#tr-sub   { font-family:'Courier Prime',monospace; font-size:11px; color:rgba(201,169,110,0.38); letter-spacing:0.2em; text-transform:uppercase; margin-top:6px; }
</style>
</head>

<div id="wrap">

window.addEventListener('keydown', e => {
  K[e.code] = true;

// ============================================================
//  WORLD MANAGEMENT
// ============================================================
function loadWorld(id) {
  WORLD = id;
  const wc = WC[id];
  // Deep-copy objects (preserve pool state for potential revisit)
  OBJS = OBJS_POOL[id].map(o => Object.assign({}, o));
  char.x      = wc.startX;
  char.y      = FLOOR;
  char.walking = false;
  char.state  = 'normal';
  char.seated = !!wc.seated;
  char.facing = 1;
  camX = Math.max(0, Math.min(wc.w - CW, char.x - CW / 2));
  dilemaShown[id] = false;
  document.getElementById('mundo-lbl').textContent =
    `MUNDO ${wc.idx} · ${wc.label}`;
}

function startTransition(nextId, year) {
  TR.state = 'out';
  TR.alpha = 0;
  TR.timer = 0;
  TR.next  = nextId;
  TR.year  = year;
  const el = document.getElementById('tr-overlay');
  el.style.display = 'flex';
  el.style.opacity = '0';
}

function updateTransition(dt) {
  const el = document.getElementById('tr-overlay');
  switch (TR.state) {
    case 'out':
      TR.alpha = Math.min(1, TR.alpha + dt * 2.2);
      el.style.opacity = TR.alpha;
      if (TR.alpha >= 1) {
        TR.state = 'show';
        TR.timer = 0;
        // populate labels
        const wc = WC[TR.next];
        document.getElementById('tr-year').textContent  = TR.year  || '';
        document.getElementById('tr-label').textContent = wc.label;
        document.getElementById('tr-sub').textContent   = wc.sub;
        loadWorld(TR.next);
      }
      break;
    case 'show':
      TR.timer += dt;
      if (TR.timer > 5.0) { TR.state = 'in'; }
      break;
    case 'in':
      TR.alpha = Math.max(0, TR.alpha - dt * 1.8);
      el.style.opacity = TR.alpha;
      if (TR.alpha <= 0) {
        TR.state = 'idle';
        el.style.display = 'none';
      }
      break;
  }
}

// ============================================================
//  DRAWING PRIMITIVES
// ============================================================
function r(x, y, w, h, fill, stroke, lw) {
  if (fill)   { ctx.fillStyle   = fill; ctx.fillRect(x, y, w, h); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw||2.5; ctx.strokeRect(x, y, w, h); }
}
function ln(x1, y1, x2, y2, col, lw) {
  ctx.strokeStyle = col||C.tinta; ctx.lineWidth = lw||2.5;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
}
function circle(x, y, rad, fill, stroke, lw) {
  ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI*2);
  if (fill)   { ctx.fillStyle   = fill;   ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw||2; ctx.stroke(); }
}

// ============================================================
//  SHARED WORLD CHROME
// ============================================================
function drawWorldChrome(ww, floorCol, ceilCol) {
  // sky strip
  ctx.fillStyle = ceilCol;
  ctx.fillRect(0, 0, CW, CEIL);
  // floor
  ctx.fillStyle = floorCol;
  ctx.fillRect(0-camX, FLOOR, ww, CH-FLOOR);
  // baseboard
  ctx.fillStyle = C.tinta;
  ctx.fillRect(0-camX, FLOOR-7, ww, 7);
  // ceiling line
  ln(0-camX, CEIL, ww-camX, CEIL, C.tinta, 3);
  // floor line
  ln(0-camX, FLOOR, ww-camX, FLOOR, C.tinta, 2.5);
}

function drawIndicator(obj) {
  blinkT += 16;
  const alpha = 0.45 + 0.45*Math.sin(blinkT*0.004);
  const col   = obj.good ? C.verde : C.tijolo;

  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.strokeStyle=col; ctx.lineWidth=1.6;
  ctx.setLineDash([5,4]);
  ctx.strokeRect(obj.x-camX-4,obj.y-4,obj.w+8,obj.h+8);
  ctx.setLineDash([]);
  ctx.globalAlpha=1;

  const dotX=obj.x+obj.w/2-camX;
  const dotY=obj.y-12;
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.arc(dotX,dotY+Math.sin(blinkT*0.005)*3,4,0,Math.PI*2); ctx.fill();

  ctx.font="10px 'Courier Prime'"; ctx.fillStyle=col;
  ctx.globalAlpha=0.75;
  const lw=ctx.measureText(obj.label).width;
  ctx.fillText(obj.label,dotX-lw/2,dotY-10);
  ctx.globalAlpha=1;

  // Hover bar
  if(obj.hover && obj._hv>0){
    const prog=Math.min(1,obj._hv/HOVER_MS);
    const bx=dotX-38, by=obj.y+obj.h+8;
    r(bx,by,76,4,'rgba(255,255,255,0.2)');
    r(bx,by,76*prog,4,col);
    ctx.fillStyle=col; ctx.font="9px 'Courier Prime'";
    ctx.fillText('fique um pouco...',bx-4,by+14);
  }
  ctx.restore();
}

function showText(obj) {
  if(textOpen||dilOpen||FLASH.active) return;

  let text, label;
  if(obj.seq){
    text  = obj.texts[obj.step];
    label = obj.label + ' (' + (obj.step+1) + '/4)';
    obj.step = (obj.step+1) % obj.texts.length;
  } else {
    text  = obj.text;
    label = obj.label;
    obj.visited = true;
  }

  document.getElementById('obj-lbl').textContent  = label.toUpperCase();
  document.getElementById('tcontent').textContent  = text;
  const box = document.getElementById('text-box');
  box.className = obj.good ? 'good' : '';
  document.getElementById('text-overlay').style.display = 'flex';
  textOpen = true;

  if(obj.good){ char.state='good'; char.goodTimer=6000; }
}

function closeText() {
  document.getElementById('text-overlay').style.display = 'none';
  textOpen = false;
}

function showDilema(wid) {
  if(dilOpen||textOpen) return;
  document.getElementById('dcontent').textContent = WC[wid].dilema;
  document.getElementById('dil-overlay').style.display = 'flex';
  dilOpen = true;
  dilemaShown[wid] = true;
}

function closeDilema() {
  document.getElementById('dil-overlay').style.display = 'none';
  dilOpen = false;
}

function interact() {
  if(dilOpen)  { closeDilema(); return; }
  if(textOpen) { closeText();   return; }
  const o = nearObj();
  if(!o) return;
  if(o.flash && !o.visited){
    o.visited = true;
    FLASH.active = true;
    FLASH.timer  = 0;
    FLASH.pending = o;
    return;
  }
  showText(o);
}

function nearObj() {
  for(const o of OBJS)
    if(char.x >= o.tx && char.x <= o.tx+o.tw) return o;
  return null;
}

// ============================================================
//  HUD
// ============================================================
function drawHUD() {
  const wc  = WC[WORLD];
  const prog = Math.min(1, char.x / (wc.exitX));
  ctx.fillStyle='rgba(15,16,16,0.7)'; ctx.fillRect(0,0,CW,5);
  ctx.fillStyle=C.dourado; ctx.fillRect(0,0,CW*prog,5);

  const vis = OBJS.filter(o=>o.visited||(o.seq&&o.step>0)).length;
  ctx.fillStyle='rgba(15,16,16,0.45)'; ctx.font="10px 'Courier Prime'";
  ctx.textAlign='right'; ctx.fillText(`${vis} / ${OBJS.length} objetos`,CW-12,CH-10);
  ctx.textAlign='left';

  // Seated prompt
  if(char.seated && WORLD==='terapia'){
    ctx.fillStyle='rgba(28,43,74,0.65)';
    ctx.font="11px 'Courier Prime'"; ctx.textAlign='center';
    ctx.fillText('[ qualquer tecla para se levantar ]',CW/2,FLOOR+22);
    ctx.textAlign='left';
  }
}

// ============================================================
//  FLASH EFFECT (artigo)
// ============================================================
function drawFlash() {
  if(!FLASH.active) return;
  const t=FLASH.timer;
  const alpha = t<0.4 ? t/0.4 : t<1.6 ? 1 : Math.max(0,1-(t-1.6)/0.5);
  ctx.fillStyle=`rgba(28,43,74,${alpha*0.97})`;
  ctx.fillRect(0,0,CW,CH);
  if(t>0.5 && t<1.6){
    const ta=Math.min(1,(t-0.5)/0.35);
    ctx.fillStyle=`rgba(201,169,110,${ta})`;
    ctx.font=`italic 17px 'Courier Prime'`; ctx.textAlign='center';
    ctx.fillText('isso. era isso que você queria entender.',CW/2,CH/2-10);
    ctx.textAlign='left';
  }
}

// ============================================================
//  GOOD-MOMENT TINT
// ============================================================
function drawGoodTint() {
  if(char.state!=='good') return;
  ctx.fillStyle='rgba(201,169,110,0.055)';
  ctx.fillRect(0,0,CW,CH);
}

// ============================================================
//  UPDATE
// ============================================================
function update(dt) {
  if(TR.state !== 'idle') { updateTransition(dt); return; }

  // Seated state (M3 intro)
  if(char.seated){
    if(K['ArrowLeft']||K['ArrowRight']||K['KeyA']||K['KeyD']){ char.seated=false; }
    return;
  }

  if(textOpen||dilOpen) return;

  const wc = WC[WORLD];

  // Movement
  char.walking=false;
  if(K['ArrowLeft']||K['KeyA']){
    char.x=Math.max(40,char.x-char.spd*dt);
    char.facing=-1; char.walking=true;
  }
  if(K['ArrowRight']||K['KeyD']){
    char.x=Math.min(wc.w-5,char.x+char.spd*dt);
    char.facing=1; char.walking=true;
  }
  if(char.walking) char.walkT+=dt*60;

  // Good state timer
  if(char.state==='good'){
    char.goodTimer-=dt*1000;
    if(char.goodTimer<=0) char.state='normal';
  }

  // Hover
  const curr=nearObj();
  for(const o of OBJS) if(o.hover&&o!==curr) o._hv=0;
  if(curr&&curr.hover&&!curr.visited){
    curr._hv+=dt*1000;
    if(curr._hv>=HOVER_MS){ showText(curr); curr._hv=0; }
  }

  // Flash timer
  if(FLASH.active){
    FLASH.timer+=dt;
    if(FLASH.timer>1.0&&FLASH.pending){ showText(FLASH.pending); FLASH.pending=null; }
    if(FLASH.timer>2.4) FLASH.active=false;
  }

  // Dilema
  if(!dilemaShown[WORLD] && char.x>=wc.dilemaX) showDilema(WORLD);

  // World exit
  if(char.x>=wc.exitX){
    if(wc.next){
      startTransition(wc.next, wc.nextYear);
    } else {
      // End of built worlds — continua...
      endScreen();
    }
  }

  // Camera
  const target=Math.max(0,Math.min(wc.w-CW,char.x-CW/2));
  camX+=(target-camX)*Math.min(1,dt*6);
}

function endScreen() {
  const el=document.getElementById('tr-overlay');
  el.style.display='flex'; el.style.opacity='1';
  document.getElementById('tr-year').textContent='';
  document.getElementById('tr-label').textContent='fim.';
  document.getElementById('tr-sub').textContent='ou não exatamente.';
  TR.state='end';
}

// ============================================================
//  MAIN DRAW
// ============================================================
function draw() {
  ctx.clearRect(0,0,CW,CH);

  const good = char.state==='good';
  const wc   = WC[WORLD];

  if(WORLD==='casa')         drawScene_casa(good);
  else if(WORLD==='universidade') drawScene_universidade(good);
  else if(WORLD==='terapia') drawScene_terapia(good);
  else if(WORLD==='mestrado') drawScene_mestrado(good);
  else if(WORLD==='doutorado') drawScene_doutorado(good);
  else if(WORLD==='rua') drawScene_rua(good);

  drawGoodTint();

  const curr = (textOpen||dilOpen||FLASH.active||char.seated) ? null : nearObj();
  if(curr) drawIndicator(curr);

  drawCharacter();
  drawFlash();
  drawHUD();
}

// ============================================================
//  STARTUP TRANSITION (M1 intro)
// ============================================================
function startIntro() {
  const el=document.getElementById('tr-overlay');
  el.style.display='flex'; el.style.opacity='1';
  document.getElementById('tr-year').textContent  = '';
  document.getElementById('tr-label').textContent = WC['casa'].label;
  document.getElementById('tr-sub').textContent   = WC['casa'].sub;
  // Begin fade-in after 1.8s
  setTimeout(()=>{
    TR.state='in'; TR.alpha=1;
  }, 1800);
}

// ============================================================
//  LOOP
// ============================================================
let last=null;
function loop(ts){
  if(last===null) last=ts;
  const dt=Math.min((ts-last)/1000,0.05);
  last=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// Initialize
loadWorld('casa');
document.fonts.ready.then(()=>{
  startIntro();
  requestAnimationFrame(loop);
});
</script>
